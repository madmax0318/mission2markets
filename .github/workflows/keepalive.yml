name: Supabase keep-alive

on:
  schedule:
    # Twice weekly — free tier pauses after ~7 days of inactivity
    - cron: "0 14 * * 0,3"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production site
        run: |
          curl -fsS -o /dev/null -w "site:%{http_code}\n" https://www.mission2markets.com/
          curl -fsS -o /dev/null -w "blog:%{http_code}\n" https://www.mission2markets.com/blog

      - name: Ping Supabase REST API
        if: vars.SUPABASE_URL != ''
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -fsS -o /dev/null -w "supabase:%{http_code}\n" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/products?select=id&limit=1"
